const SEED_BOOKS=[
{id:'bk_engine',title:'The Engine Room: why you gas out',subject:'tech',text:`Every fighter runs two engines at once, and knowing how they work is the difference between fading in the third round and still being dangerous when it counts.

The first is your aerobic engine. It burns fuel slowly, using oxygen, and it powers everything from a long walk to the steady background work of staying upright in a fight. It is patient and almost tireless, but it cannot deliver energy fast. The second is your anaerobic engine. It produces energy in a hurry, without waiting for oxygen, and it is what fires your explosive shots, sprawls and scrambles. It is enormously powerful but it runs out fast, and it leaves a mess behind.

That mess is the key to the whole story. When you work hard enough, your muscles produce energy faster than oxygen can keep up, and a by-product called lactate builds up, along with the hydrogen ions that actually make your muscles burn and slow down. People blame "lactic acid," but lactate itself is mostly fuel your body can reuse. The real problem is the acidity that piles up when you cross a certain intensity. That tipping point has a name: your threshold.

Your test put that threshold at a heart rate of roughly 174. Below it, your aerobic engine is keeping the books balanced and you can hold the pace for a long time. Above it, the mess accumulates faster than you can clear it, your output drops, your arms feel heavy, and you "gas." The closer that threshold sits to your maximum, the longer you can fight at a high pace before it happens.

Then there is the size of the aerobic engine itself, measured as VO2max: the most oxygen your body can use per minute. Yours came back at 54, which is genuinely strong. A big engine is not about going fast in a straight line; for a fighter it means something more useful. It means you recover between explosive efforts. The faster you can refill between a scramble and the next exchange, the fresher you are when the next exchange comes.

So here is the trap a lot of athletes fall into. They train almost entirely in the painful zone, going to war every session, because it feels like the hardest work must be the most valuable. But hammering the anaerobic engine without building the aerobic one underneath it just teaches your body to produce the mess faster. It does not teach it to clear the mess, and it does not grow the engine that buys back your recovery.

This is why the boring work matters most. Long, easy sessions at a conversational pace, where you can still talk and breathe through your nose, are not junk miles. At that intensity your body adapts in quiet but powerful ways: it grows more tiny power plants inside your muscle cells, called mitochondria, and builds more small blood vessels to deliver oxygen and carry waste away. The result is a bigger engine that clears lactate faster and pushes your threshold higher. Elite fighters spend years building exactly this base, and most amateurs skip it.

The second piece is teaching your body to tolerate and clear the mess on purpose. That is what interval work does: you push hard enough to flood the system, then back off just enough to start clearing it, over and over. Done with a real aerobic base underneath, this raises the ceiling at which you fall apart. Done without that base, it just burns you out.

The third piece is repeat-sprint ability: short, all-out efforts with short rest, repeated. This is the closest thing to what a fight actually demands, because a fight is not one long effort, it is dozens of explosions stitched together with incomplete rest. The fighter who can fire the tenth explosion almost as hard as the first is the one who wins late.

Put together, the plan writes itself. Build the aerobic base first so the engine is big and recovery is fast. Then sharpen the threshold so you can live at a higher pace without drowning. Then layer in the repeat explosions so your power survives deep into the fight. Skipping straight to the last step is the most common mistake, and it is exactly the one your test results warn against, because your profile shows good power but a system that turns sour a little too quickly under pressure.

None of this is about suffering more. It is about suffering smarter, in the right doses, in the right order, so that when you walk back into the cage your engine is bigger, your threshold is higher, and you are the one still pushing the pace when everyone else is gassing.`},
{id:'bk_marsh',title:'The Marshmallow Test & real willpower',subject:'psych',text:`In the late 1960s a psychologist named Walter Mischel ran an experiment at a preschool on the Stanford campus that became one of the most famous studies in all of psychology. The setup was simple enough to explain to a four-year-old, which is roughly who the subjects were. A child was left alone in a room with a single treat, often a marshmallow, and a deal: eat it now, or wait about fifteen minutes until the researcher came back and get two. Then the adult left, and a hidden camera watched what happened next.

What happened next is wonderful to watch. Children sniffed the marshmallow, stroked it, turned around, sang to themselves, kicked the table, covered their eyes, and in some cases caved within seconds. Some held out the whole time. On its own that is just a charming study of small children resisting sugar. What made it famous came years later.

Mischel and his colleagues tracked some of those children as they grew up, and reported that the ones who had waited longer tended to do better later in life by various measures, from school results to how they handled stress. The story that spread from this was irresistible and simple: willpower is a fixed trait, some people have it and some do not, and the amount you have as a child quietly determines your future. Delay gratification, the moral went, and you will win at life.

It is a tidy story. It is also, we now know, far too simple, and the more careful findings are actually more useful to you.

Start with what the children who succeeded were really doing. They were not gritting their teeth and white-knuckling their way through raw temptation. The ones who lasted were the ones who changed their situation. They looked away from the treat. They distracted themselves. Crucially, Mischel found that when children were coached to think about the marshmallow differently, to imagine it as a fluffy cloud or a picture rather than a delicious thing to eat, they could suddenly wait far longer. The skill on display was not raw resistance. It was attention management: the ability to cool a hot temptation by changing how you frame it and what you let yourself look at.

That is a very different lesson from "have more willpower." It says willpower is less a muscle you strain and more a set of strategies you can learn. The winners were not stronger; they were better at arranging the moment so the temptation had less grip.

Then, in 2018, a team of researchers led by Tyler Watts ran a much larger and more careful version of the study, with a more diverse group of children and statistical controls the original lacked. Their results trimmed the legend down to size. The link between waiting as a child and succeeding later was much weaker than the famous version suggested, and a lot of it was explained by something else entirely: the child's background. Children from more secure, resourced homes waited longer on average, and those same advantages also predicted later success. The marshmallow was partly just measuring which kids came from stability.

There is one more piece that reframes the whole thing. A separate study showed that whether a child waited depended heavily on whether they had reason to trust the promise. When researchers first proved unreliable, breaking an earlier promise to the same child, those children sensibly grabbed the treat immediately. Why wait for a second marshmallow from an adult who lies? Their "impatience" was not weak character. It was a rational response to an untrustworthy environment.

So what should you actually take from all this, as someone trying to hold the line on training and diet and money?

First, stop treating willpower as a fixed amount of grit you either have or lack. The evidence points the other way. The people who resist temptation best are usually not the ones suffering most; they are the ones who arranged things so they did not have to suffer in the first place. Keep the junk food out of the house and you do not need to resist it at midnight. Lay your kit out the night before and the decision is half made. Put your savings somewhere slightly annoying to reach and the impulse buy dies on its own.

Second, learn the cooling trick. When a craving is hot, do not stare it down. Change the frame, change the focus, put time and distance between you and it. The urge passes faster than it feels like it will.

Third, build a trustworthy environment, including the promises you make to yourself. If you constantly break your own commitments, part of you stops believing the second marshmallow will ever come, and it becomes rational to grab the small reward now. Keep small promises to yourself and your own follow-through becomes easier, because you have given yourself a reason to bet on the future.

The marshmallow test did not really prove that some people are born with iron discipline. Read properly, it shows something far more encouraging: that self-control is mostly strategy, environment and trust, and all three of those are things you can build.`},
{id:'bk_breath',title:'Breath: the lost art of breathing',subject:'tech',text:`We take roughly 25,000 breaths a day without thinking about a single one, and James Nestor's argument in "Breath" is that most of us are doing it badly — too fast, too shallow, and through the mouth. His book is part history, part self-experiment, and its core message is simple: how you breathe changes your body and mind more than almost anything else you do unconsciously.

Start with the nose. Your nose is not just an air hole; it filters, warms and humidifies the air, and it releases nitric oxide, a molecule that helps your blood vessels open and your body take up oxygen more efficiently. Breathing through your mouth skips all of that. Nestor ran an experiment where he plugged his nose for ten days, and his health measurably worsened — his sleep fell apart, his blood pressure rose, he snored for hours. Switching back to nasal breathing reversed it. Chronic mouth breathing, especially at night, is linked to snoring, broken sleep and even dental problems.

Then comes the counterintuitive part: most of us breathe too much. It feels like more air should mean more oxygen and more energy, but at rest your blood is already almost fully saturated with oxygen. The thing that actually governs how much oxygen reaches your muscles is carbon dioxide. CO2 is not just waste gas to flush out as fast as possible — it is the signal that tells your blood to release oxygen into your tissues. Breathe too hard and too fast, blow off too much CO2, and paradoxically less oxygen gets delivered where you need it. That is why over-breathing can leave you light-headed and anxious.

This reframes the goal. Better breathing is not about gulping more air; it is about tolerating more CO2 and breathing less. People who train this way — slower, lighter breathing — tend to feel calmer and to hold composure under physical stress, because their body stops sounding the alarm at the first rise in CO2.

The other big lever is slowness. Nestor keeps returning to a number: about five and a half breaths per minute, with long, even inhales and exhales. At that pace, breathing and heart rhythm fall into sync, the calming branch of your nervous system takes over, and stress measurably drops. It is the physiology behind why slow breathing settles you before a hard effort or a tense moment.

For you specifically, this plugs straight into your plan. Your Zone 2 sessions already tell you to breathe through your nose if you can — Nestor explains why that cue matters: it keeps the pace honest, builds CO2 tolerance, and trains a calmer, more efficient engine. The fighter who can stay relaxed and breathe slow between exchanges, instead of gasping through the mouth, recovers faster and panics less. Breath control is part of conditioning, not separate from it.

If you want concrete practice, three drills cover most of the benefit. First, simply close your mouth — during the day, on easy training, and ideally at night. Second, practice slow breathing: in for about five and a half seconds, out for about five and a half, for a few minutes, especially before sleep or before a hard round. Third, get comfortable with the mild air-hunger of breathing slightly less than feels natural; that discomfort is the training stimulus for CO2 tolerance, the same way burning legs are the stimulus in a hard interval.

A fair word of caution. Some of the book's bigger claims are dramatic and lean on single experiments or older fringe sources, and you should read those with a raised eyebrow. But the durable core is well supported and costs nothing: breathe through your nose, slow down, exhale fully, and stop over-breathing. The deeper point Nestor lands is that breathing is the one automatic system you can also seize manual control of whenever you choose — a dial you can reach for, to calm down, to focus, to recover, any time you remember it is there.`},
{id:'bk_sleep',title:'Why We Sleep: the case for 7-9 hours',subject:'psych',text:`We tend to treat sleep as the thing we cut when life gets busy — the most expendable block in the day. Matthew Walker's central argument in "Why We Sleep" is that this is exactly backwards: sleep is not downtime your body merely tolerates, it is active, essential maintenance, and skimping on it quietly degrades nearly everything you care about, from memory to mood to physical recovery.

Two forces decide when you feel sleepy. One is your circadian rhythm, the roughly 24-hour internal clock that rises and falls with light and tells your body when it expects to be awake. The other is sleep pressure: a chemical called adenosine that builds up the longer you are awake and makes you feel steadily more tired. Caffeine works by blocking adenosine — it does not remove the tiredness, it just masks it, and when the caffeine wears off the whole backlog lands at once.

Once you are asleep, the night is not one uniform state. You cycle through stages roughly every ninety minutes. Deep, dreamless sleep, concentrated earlier in the night, is when the body does its physical repair and when the brain files away facts and clears out metabolic waste. Dreaming REM sleep, concentrated in the later cycles toward morning, is when the brain processes emotion, connects ideas and cements skills. Both matter, and they are not interchangeable. This is the catch that makes short sleep so costly: because REM loads into the final cycles, cutting your night from eight hours to six does not shave a flat quarter off everything — it amputates a large share of your REM specifically.

The consequences of running short are broad and well documented. Reaction time and attention fall off a cliff, to the point where heavy sleep loss impairs you about as much as being drunk. Learning suffers, because memories never get properly consolidated. The immune system weakens. Appetite hormones tilt toward overeating. And for an athlete in particular the cost is direct: much of your testosterone and growth hormone release happens during deep sleep, which is precisely when adaptation and tissue repair occur. Train hard and sleep little and you take on the damage without banking the recovery — and your injury risk climbs.

That last point deserves to sit with you. You do not get stronger or faster during training. Training is the stimulus; the adaptation happens while you recover, and the deepest recovery happens while you sleep. In a real sense, sleep is the session you do lying down. An extra hour in bed can do more for your performance than an extra hour of work when you are already tired.

The practical advice is unglamorous and effective. Keep a regular schedule — your clock craves consistency more than any single long lie-in. Keep the room cool and dark. Get daylight early and dim the lights at night. Be honest about caffeine, whose effects linger for many hours, so an afternoon coffee can quietly thin the depth of your night. Alcohol is worse than it feels: it sedates you but fragments sleep and blunts REM.

This is exactly why your app back-calculates a cycle-aligned bedtime on the Rest tab, and why your coach's plan lists seven to nine hours as non-negotiable rather than a nice-to-have. The ninety-minute cycle math is not arbitrary — it aims to wake you near the end of a cycle instead of dragging you out of deep sleep, so you come up sharp instead of wrecked.

One honest caveat. Walker's book was hugely influential but also drew criticism from some scientists for overstating a handful of specific claims and presenting a few scary numbers more confidently than the evidence supports. That critique is fair, and you should hold the most alarming individual statistics loosely. But the central message survives all of it intact and is not seriously disputed: consistent, sufficient sleep is one of the highest-return, lowest-cost things you can do for body and mind. For someone rebuilding as an athlete, it may be the single most undervalued tool you already own.`},
{id:'bk_habits',title:'Atomic Habits: systems over willpower',subject:'psych',text:`James Clear's "Atomic Habits" opens with one liberating claim: you do not rise to the level of your goals, you fall to the level of your systems. Goals set direction, but the daily system produces the results. Two fighters can share the identical goal of being fight-ready; the one with the better system wins, regardless of who wants it more on any given morning.

The title is the thesis. An atomic habit is a tiny routine that looks insignificant alone but compounds. Clear's image is one percent better each day: barely noticeable daily, but a thirty-seven-fold difference over a year. The flip side is just as true — small bad habits compound into decline. Most real change is not a dramatic overhaul; it is a slightly better default, repeated until it becomes who you are.

That phrase — who you are — is the deepest idea in the book. Most people try to change from the outside in: chase an outcome, grind on the behaviour. Clear argues the durable path runs the other way, from identity outward. Decide who you want to be — "I am someone who trains" — and let each small action be a vote for that identity. You do not need to win every vote, only the majority. A missed session is one vote against; it does not erase the others, unless you let it become two, then three.

The practical engine is his four laws, built on how a habit actually works: a cue triggers a craving, which drives a response, which delivers a reward. To build a good habit, make the cue obvious, the craving attractive, the response easy and the reward satisfying. To break a bad one, invert each: invisible, unattractive, hard, unsatisfying.

Several tactics fall out of this. Environment design beats willpower — the same lesson as the marshmallow study. If the junk food is not in the house, you do not have to resist it; if your kit is laid out the night before, training is half-started before you wake. Habit stacking ties a new habit to an existing one: after I make coffee, I log yesterday's training. The two-minute rule shrinks a daunting habit to something trivial to begin — "read one page," "do one round" — because starting is the hard part and motion creates momentum. And the rule that saves you on bad days: never miss twice. One slip is an accident; two is the start of a new, worse habit.

There is a quiet warning in the book about plateaus. Progress is rarely linear; you put in the work and seem to get nothing back for weeks, because results lag behind effort. Clear calls this the valley of disappointment, and it is where most people quit — right before the breakthrough the accumulated work was about to deliver. Your conditioning rebuild will feel exactly like this: weeks of unglamorous Zone 2 and logging with the payoff arriving later, all at once. The system does not feel like it is working until suddenly it is.

The honest limits are worth naming. The book is light on novel science and heavy on repackaging known behavioural psychology into memorable rules, and the one-percent math is more motivational metaphor than literal forecast. But as an operating manual it is genuinely useful, precisely because it is simple enough to actually run.

For you, the connection is direct: the app in your hand is an atomic-habits machine. The daily quests are obvious cues, the XP and streaks are satisfying rewards, the Coach makes the next response easy by choosing it for you. The whole design exists to make the right action the default and keep your run of identity-votes alive. Clear would say the goal of getting fight-ready is fine, but the boring system underneath — show up, log it, never miss twice — is what actually carries you there.`},
{id:'bk_dopa',title:'Dopamine Nation: pleasure, pain & discipline',subject:'psych',text:`Anna Lembke is an addiction psychiatrist, and "Dopamine Nation" takes the science of addiction and shows it now describes ordinary modern life. We live in a world engineered to flood us with easy pleasure — phones, sugar, porn, games, endless novelty — and our brains, built for scarcity, are not equipped for that abundance.

Her central image is a balance, a seesaw in the brain between pleasure and pain. Every hit of pleasure tips it toward the pleasure side; the brain hates imbalance and immediately pushes back, tipping just as far toward pain to restore level. That is the comedown, the craving, the faint emptiness after the scroll or the snack. Chase pleasure again to fix it and you tip the seesaw harder, and it rebounds harder. Do this enough and your baseline resets: the seesaw now rests permanently on the pain side. That is what anhedonia is — needing the hit just to feel normal, getting no real joy from it, and feeling flat without it.

The escape is counterintuitive and, for an athlete, encouraging. If pressing the pleasure side drives you into pain, then deliberately pressing the pain side drives you, by the same mechanism, into lasting pleasure. Hard exercise, cold exposure, fasting, intense focus, discomfort willingly chosen — these tip the seesaw toward pain in the moment, and the brain's rebound pushes you toward steady, earned wellbeing afterwards. The calm after a brutal session, the clarity after a fast: that is the seesaw paying you back. Pain chosen on purpose is medicine; pleasure chased compulsively is the poison.

The first practical tool is what she calls a dopamine fast — a deliberate break from your drug of choice, often around a month, long enough for the seesaw to relevel and for ordinary things to feel good again. The discomfort of the first days is just an over-stimulated system finding its baseline. After it, a coffee, a walk, a conversation can feel like enough again.

The second tool is honesty — what she calls radical truth-telling. Addiction thrives in secrecy and self-deception, and naming your behaviours plainly is itself a brake on them. The third is self-binding: building physical and rule-based barriers between you and the easy hit, because in the moment of craving willpower is the weakest tool you own. Leave the phone in another room. Do not keep the thing in the house. The same lesson, again, from a different field: design beats willpower.

A fair caveat: the book leans on vivid clinical stories more than hard data, and "dopamine" has become a pop-science catch-all that oversimplifies a complex system. Treat the neuroscience as a useful metaphor rather than a precise mechanism. But the lived prescription is sound and lines up with everything else in your training: comfort chased endlessly makes you weaker and flatter; discomfort chosen deliberately, in the right doses, makes you stronger and, oddly, happier.

For you this reframes the hard parts of your plan as features, not costs. The boring Zone 2, the discipline of logging food, the willingness to be bored instead of reaching for the phone — these are not only building your engine, they are resetting your reward system so that real life feels good again. The screen offers a cheap tip of the seesaw; the training offers the kind that pays you back.`},
{id:'bk_scale',title:'Scale: the hidden laws of size',subject:'tech',text:`Geoffrey West is a physicist who turned his tools on living things, cities and companies, and "Scale" is his hunt for the simple mathematical laws hiding behind their staggering variety. The headline is that size changes everything in a precise, predictable way — and almost never the way intuition expects.

Start with a famous puzzle. A mouse and an elephant are both mammals built from similar cells, yet the elephant is roughly 200,000 times heavier. You might guess it burns 200,000 times more energy. It does not — it burns far less than that. Metabolism scales to about the three-quarter power of mass, a pattern so consistent it has a name: Kleiber's law. Double an animal's size and it needs only about 75 percent more energy, not 100 percent. Bigger life is systematically more efficient per cell.

Why three-quarters, and why so universal? West's answer is networks. Life is plumbed by branching, fractal-like distribution systems — your circulatory system, the airways in your lungs, the veins in a leaf — and the geometry of filling a three-dimensional body with such a network forces these particular ratios. The same math that sets an elephant's heart rate sets yours. It even predicts lifespan: bigger animals live longer but their hearts beat slower, and remarkably, most mammals get roughly the same total number of heartbeats in a life. You are, in a deep sense, living the same allotment as the mouse, just spent more slowly.

This sublinear scaling — more output for proportionally less input as you grow — runs through all of biology, and it is why you cannot simply scale things up. A giant shaped like a person could not exist; bone and muscle strength do not scale with body mass the same way, so the giant would shatter under its own weight. Size is never free; every change in scale rewrites what is possible.

Then West turns to cities and finds something startling: they scale too, but differently. Infrastructure like roads and pipes scales sublinearly, like biology — a city twice as big needs less than twice the infrastructure, which is why dense cities are green per person. But the human output of cities — wages, patents, ideas, and crime — scales superlinearly: double the size and you get more than double, because density multiplies interaction. Cities, unlike animals, speed up as they grow, and that engine demands ever-accelerating innovation to avoid collapse — a treadmill West doubts can run forever.

A fair caveat: West reaches for a grand unified theory, and critics argue he sometimes forces messy reality into clean curves; the city and company data are noisier than the animal data. But the core biological scaling laws are real and beautiful.

For you, there is a concrete takeaway buried in the math. Your engine, your heart rate, your recovery, even your weight class sit on these curves. It is part of why adding or dropping mass changes your conditioning out of proportion to the number on the scale — energy cost, heat dissipation and oxygen delivery all scale non-linearly with size. Your lean, efficient build is not just aesthetics; it is you sitting at a favourable point on a curve that has governed life for a billion years. The deeper gift of the book is a way of seeing: behind the chaos of living things sit a few stubborn numbers, and once you notice them you cannot unsee them.`},
{id:'bk_time',title:'The Order of Time: what time really is',subject:'tech',text:`Carlo Rovelli is a theoretical physicist and a rare one who writes like a poet. "The Order of Time" is his attempt to dismantle, piece by piece, everything you think you know about time — then rebuild something stranger and more beautiful.

He starts by taking time apart. There is no single universal clock ticking for the whole cosmos. Einstein showed that time runs slower where gravity is stronger and where you move faster, and this is not a trick — a clock at sea level genuinely runs slower than one on a mountain, and the difference has been measured. Put two precise clocks at different heights and in time they will disagree. So there is no shared "now" stretched across the universe; the idea of the present moment, everywhere at once, simply dissolves. Your now is only local.

Next he comes for time's direction. In the fundamental equations of physics, the arrow of time barely appears — most of them work the same forwards and backwards. So where does the overwhelming sense that time flows one way, that the past is fixed and the future open, actually come from? Rovelli's answer is entropy, the same idea you have already met. The universe began in a low-entropy, highly ordered state and has been spreading toward disorder ever since. The arrow of time is nothing more than that one-way slide from order to disorder. Heat flows from hot to cold, eggs break and never unbreak, memories pile up of the past and never the future — all of it is entropy increasing. Time's direction is not stamped into reality at the deepest level; it emerges from this statistical drift.

Then the most vertiginous claim: at the most fundamental level, time may not exist at all. In the equations Rovelli works on for quantum gravity, the variable for time can be removed entirely and the physics still works. What we experience as the flow of time, he argues, is not a feature of the universe but of our particular, blurred, large-scale view of it. We are creatures who see the world coarsely — we cannot track every molecule — and out of that blur the sensation of flowing time arises. Time, in this view, is less a fact about the world than a fact about us and our limited perspective on it.

If that sounds cold, Rovelli lands somewhere unexpectedly warm. Losing the illusion of absolute time does not make our experience less real; it makes us part of the same impermanent, interconnected flow as everything else. We are not things, he writes, so much as events — temporary, ongoing happenings, like a wave or a song, rather than fixed objects.

A fair caveat: much of the final third rests on Rovelli's own preferred theory of quantum gravity, which is unproven and not the only contender; he is honest that he is offering one physicist's vision, not settled fact. Read it as a brilliant, grounded provocation rather than a closed case.

It connects back to the entropy concept already in your app, but pushes it much further: the same slide toward disorder that caps an engine's efficiency and makes heat flow one way is also, quietly, the thing that gives your whole life its sense of direction. The minutes you spend training, reading and recovering are not ticking off some cosmic clock — they are you, an event in progress, riding the one arrow the universe actually has.`},

const _pageCache={};
function paginate(text){
  const paras=text.split(/\n\n+/); const pages=[]; let cur='';
  for(let p of paras){ p=p.trim(); if(!p)continue;
    if((cur.length+p.length)>880 && cur){ pages.push(cur); cur=''; }
    if(p.length>880){ let i=0; while(i<p.length){ pages.push(p.slice(i,i+880)); i+=880; } continue; }
    cur+=(cur?'\n\n':'')+p; }
  if(cur)pages.push(cur);
  return pages.length?pages:[text];
}
function allBooks(){ return SEED_BOOKS.concat(S.mind.library||[]); }
function bookById(id){ return allBooks().find(b=>b.id===id); }
function bookPages(b){ if(!b)return['']; if(!_pageCache[b.id])_pageCache[b.id]=paginate(b.text); return _pageCache[b.id]; }
function readingProg(id){
  S.mind.reading=S.mind.reading||{};
  let pr=S.mind.reading[id];
  if(!pr){ pr={mark:0,furthest:0,claimed:0,finished:false}; S.mind.reading[id]=pr; }
  if(pr.furthest===undefined)pr.furthest=pr.mark||0;
  if(pr.claimed===undefined)pr.claimed=0;
  if(pr.finished===undefined)pr.finished=false;
  if(pr.liked===undefined)pr.liked=false;
  return pr;
}
const MP_PER_PAGE=5, FINISH_BONUS=20;
function rewardReading(){
  const b=bookById(_rBook); const pages=bookPages(b); const pr=readingProg(_rBook);
  pr.furthest=Math.max(pr.furthest,pr.mark);
  const reached=pr.furthest+1; let gained=0;
  if(reached>pr.claimed){ gained+=(reached-pr.claimed)*MP_PER_PAGE; pr.claimed=reached; }
  let finishedNow=false;
  if(pr.furthest>=pages.length-1 && !pr.finished){ pr.finished=true; finishedNow=true; gained+=FINISH_BONUS; }
  if(gained>0){ S.mind.mp+=gained; S.mind.subj[b.subject]=(S.mind.subj[b.subject]||0)+gained; save(); renderHud(); }
  return {gained,finishedNow};
}

let _rBook=null;
function openReader(id){ _rBook=id; readingProg(id); document.getElementById('reader').classList.add('show'); renderReaderPage();
  document.getElementById('rClose').onclick=()=>document.getElementById('reader').classList.remove('show');
  document.getElementById('rPrev').onclick=()=>readerNav(-1);
  document.getElementById('rNext').onclick=()=>readerNav(1);
  document.getElementById('rLike').onclick=()=>{const pr=readingProg(_rBook);pr.liked=!pr.liked;save();renderReaderPage();toast(pr.liked?'♥ Liked — saved to your shelf':'Removed like');};
  document.getElementById('rDeeper').onclick=()=>deepenBook(_rBook);
}
async function deepenBook(id){
  if(!backendOn()){openAISettings();return;}
  const b=bookById(id); if(!b)return;
  const dp=document.getElementById('rDeeper'); if(dp){dp.disabled=true;dp.textContent='Going deeper…';}
  try{
    const intro=(bookPages(b)[0]||'').slice(0,800);
    const base=b.title.replace(/ — deeper.*$/,'');
    const res=await backendCall('/deepen',{topic:base,seen:intro});
    const text=(res.raw||'').trim();
    if(!text||text.length<80) throw {kind:'badresp'};
    const n=(S.mind.library||[]).filter(x=>x.title&&x.title.indexOf(base+' — deeper')===0).length;
    const title=base+' — deeper'+(n?(' '+(n+1)):'');
    const nb={id:'bk_'+Math.random().toString(36).slice(2,8),title,subject:b.subject,text,generated:true};
    S.mind.library=S.mind.library||[]; S.mind.library.push(nb);
    readingProg(nb.id).liked=true; save();
    openReader(nb.id);
    toast('✨ A deeper take — enjoy');
  }catch(e){
    if(dp){dp.disabled=false;dp.textContent='✨ Go deeper into this';}
    toast(aiErrMsg(e));
  }
}
function renderReaderPage(){
  const b=bookById(_rBook); const pages=bookPages(b); const pr=readingProg(_rBook);
  pr.mark=Math.max(0,Math.min(pr.mark,pages.length-1));
  const res=rewardReading();
  document.getElementById('rTitle').textContent=b.title;
  document.getElementById('rPage').innerHTML=esc(pages[pr.mark]).replace(/\n/g,'<br>');
  document.getElementById('rPageNum').textContent=`Page ${pr.mark+1} / ${pages.length}`;
  const pct=Math.round((pr.furthest+1)/pages.length*100);
  document.getElementById('rGoalBar').style.width=pct+'%';
  document.getElementById('rGoalTxt').textContent=pr.finished?`✓ Finished · ${pr.claimed*MP_PER_PAGE+FINISH_BONUS} MP earned — kept for review`:`Progress ${pct}% · +${MP_PER_PAGE} MP per new page`;
  document.getElementById('rPrev').disabled=pr.mark<=0;
  document.getElementById('rNext').disabled=pr.mark>=pages.length-1;
  const lk=document.getElementById('rLike'); if(lk){lk.textContent=pr.liked?'♥':'♡';lk.classList.toggle('on',!!pr.liked);}
  const dp=document.getElementById('rDeeper'); if(dp){dp.style.display=backendOn()?'block':'none';dp.disabled=false;dp.textContent='✨ Go deeper into this';}
  document.getElementById('rPage').scrollTop=0;
  save();
  if(res.finishedNow)toast(`📗 ${b.title} finished · +${FINISH_BONUS} MP bonus!`);
  else if(res.gained>0)toast(`+${res.gained} MP`);
}
function readerNav(d){ const pages=bookPages(bookById(_rBook)); const pr=readingProg(_rBook); pr.mark=Math.max(0,Math.min(pr.mark+d,pages.length-1)); renderReaderPage(); }
function openAddBook(){

    <div class="lesson" style="font-size:13px">Paste text, or import a .txt / .md file you own. It paginates and bookmarks automatically. (For a study you want in plain language, ask me in chat and I'll write you a reader edition.)</div>

    <div class="field"><button class="btn ghost sm" id="qClose">Close</button></div>`;
  document.getElementById('modalBack').classList.add('show');

  document.getElementById('bkFile').onclick=()=>document.getElementById('bookFile').click();
  document.getElementById('bkSave').onclick=()=>{const t=document.getElementById('bkTitle').value.trim();const tx=document.getElementById('bkText').value.trim();if(!t||!tx)return;addBook(t,document.getElementById('bkSubj').value,tx);};

function addBook(title,subject,text){ const id='bk_'+Math.random().toString(36).slice(2,8); S.mind.library=S.mind.library||[]; S.mind.library.push({id,title,subject,text}); save(); closeModal(); renderView(); toast('📚 Added: '+title); }

// book file import
document.getElementById('bookFile').addEventListener('change',ev=>{
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{const tx=document.getElementById('bkText');const ti=document.getElementById('bkTitle');if(tx)tx.value=r.result;if(ti&&!ti.value)ti.value=f.name.replace(/\.(txt|md)$/i,'');toast('File loaded — review and Add');};
  r.readAsText(f);ev.target.value='';
});

const SPIRIT_ISLAM=[
 {id:'hikma',title:'The House of Wisdom',sub:'History · Baghdad, 8th–9th century',
  body:`In Abbasid Baghdad there grew a centre of study later remembered as the House of Wisdom — Bayt al-Hikma. Under caliphs such as al-Mansur, Harun al-Rashid and especially al-Ma'mun, it became the heart of a vast translation movement: scholars gathered, translated and built upon the knowledge of the Greeks, Persians and Indians, at a time when much of that learning might otherwise have been scattered or lost.

The translation effort was deliberate and well-funded. Works of Aristotle, Euclid, Ptolemy and Galen were rendered into Arabic, often by way of Syriac, by translators of many faiths — Muslims, Christians and others working side by side. One of the most celebrated, Hunayn ibn Ishaq, a Christian physician, set careful standards for translation that raised the quality of the whole enterprise. Knowledge was treated as something to be sought wherever it could be found.

It helped that the technology of the book was changing. Paper-making, learned from the east, spread through the Islamic world and made the copying of texts far cheaper than parchment ever allowed. Baghdad's book markets and libraries grew, and learning spread with them.

It was in this world that Muhammad ibn Musa al-Khwarizmi worked. From his name comes the word "algorithm," and from the title of his book, al-jabr, comes "algebra." Around him worked others whose names still echo: al-Kindi, who wrote on philosophy, medicine and cryptography; and later thinkers across the Islamic world who advanced astronomy, optics, chemistry and medicine for centuries.

It would be too simple to imagine an unbroken golden age — there were rivalries, political upheavals, and later periods of decline and destruction, including the sack of Baghdad in 1258. Historians still debate how formal an "institution" the House of Wisdom really was, versus a broader culture of patronage and scholarship. The romantic image and the careful history don't always match perfectly.

But the deeper thread holds, and it's worth sitting with: for a long, bright stretch, the pursuit of knowledge was treated not as a threat to faith but as part of a life well lived — curiosity as something close to devotion, and the wisdom of other peoples as something to honour rather than fear.`,
  prompt:"What's one thing you're genuinely curious to understand — and when did you last make real room for that, with no goal but the knowing?",
  note:"A broad, widely-accepted sketch of history; specifics are debated by scholars. For depth, read proper historians and primary sources."},
 {id:'pillars',title:'The Five Pillars',sub:'Knowledge · the foundations',
  body:`The Five Pillars are the framework of practice in Islam: the shahada, the declaration of faith; salah, the five daily prayers; zakat, the giving of a portion of one's wealth to those in need; sawm, the fast of Ramadan; and hajj, the pilgrimage to Mecca, for those who are able, once in a lifetime.

What's striking when you lay them out is their shape: belief, then rhythm, then generosity, then restraint, then journey. They move from the inward to the outward, and they return — every day, every year, once in a life.

Each is simple to name and a lifetime to inhabit.`,
  prompt:"Of these five movements — faith, rhythm, generosity, restraint, journey — which one feels most alive in you now, and which most neglected?"},
 {id:'hijra',title:'The Hijra',sub:'History · 622 CE',
  body:`In 622 CE the early Muslim community left Mecca, where they faced persecution, and migrated to the city of Yathrib — which became known as Medina. This journey, the Hijra, was significant enough that the Islamic calendar counts its years from it.

The Hijra is remembered not just as an escape but as a beginning: in Medina a community was built, with agreements between different groups living side by side.

There's a quiet lesson in starting the count of years not from a birth or a victory, but from the moment a people chose to leave comfort behind for the sake of something they believed in.`,

 {id:'haytham',title:'Ibn al-Haytham & the experiment',sub:'History · the testing of ideas',
  body:`Ibn al-Haytham, working around a thousand years ago, studied light and vision with an approach that feels strikingly modern: he insisted that claims be tested against careful observation rather than accepted on authority alone. For this, many credit him as an early pioneer of the experimental method.

He wrote, in spirit, that the seeker after truth should doubt, question, and check — even the famous, even the ancient.

There's something humbling in it: a man of deep faith treating honest doubt and patient testing as the proper road to understanding the world.`,

 {id:'control',title:'The dichotomy of control',sub:'Stoicism · Epictetus',
  body:`Epictetus, born a slave and later a teacher, built much of his philosophy on a single distinction: some things are within our control, and most things are not. Our judgements, our efforts, our responses — ours. The weather, other people, the outcome, the past — not ours.

Most suffering, he argued, comes from gripping tightly to the second category. Peace comes from pouring our energy into the first and loosening our grip on the rest.

It's a clean idea, and like all clean ideas it's harder to live than to state. People also push back: is it too cold, too resigned? Where's the line between accepting what you can't change and giving up too early? Worth sitting with rather than settling.`,

 {id:'memento',title:'Memento mori',sub:'A thread across traditions',
  body:`"Remember that you will die." Stoics kept the thought close; so, in their own ways, do Sufis, Buddhists, and many faiths — including the Islamic remembrance of death as a counsel to live rightly.

The point was never to be morbid. It was to sharpen life. When you remember the day is finite, the trivial loosens its grip and the important comes into focus. A petty argument shrinks. A person you love grows larger.

Some find the thought frightening; others find it freeing. Both responses are honest. The invitation is only to let the fact of an ending make the middle matter more.`,

 {id:'examined',title:'The examined life',sub:'Socrates · ancient Athens',
  body:`On trial for his life, Socrates is remembered as saying that the unexamined life is not worth living. He spent his days asking people what they really meant by the words they used most confidently — justice, courage, goodness — and showing, gently and infuriatingly, how rarely they knew.

His method wasn't to hand over answers. It was to ask better questions until your own thinking either deepened or revealed its cracks.

You can disagree with him. Plenty have — perhaps an over-examined life forgets to actually be lived. But the core stands as a question worth your own answer: how much of what you believe have you ever really looked at?`,

 {id:'meaning',title:'Meaning in the suffering',sub:'Viktor Frankl · logotherapy',
  body:`Viktor Frankl survived the concentration camps and wrote that those who endured were often not the strongest, but those who held onto a why — a meaning, a person, a task waiting for them.

He argued that we cannot always choose what happens to us, but we can choose the stance we take toward it — and that meaning is not handed to us but found, even in suffering, through what we do, what we love, and how we bear what we must.

It's not a tidy promise that pain is "worth it." It's a harder, steadier claim: that even when you can't change the situation, you are still the one who decides what it will mean.`,

  for(const h of QHOSTS){
    try{ const r=await fetch(h+path); if(!r.ok)continue; const d=await r.json(); if(d&&d.code===200&&Array.isArray(d.data)){j=d;break;} }catch(e){}
  }
  if(!j) throw 0;
  const by={}; j.data.forEach(d=>{by[d.edition.identifier]=d;});
  const ar=by['quran-uthmani'], en=by['en.pickthall'], tl=by['en.transliteration'];

//================= ENCRYPTED CROSS-DEVICE SYNC =================
const _b64=buf=>btoa(String.fromCharCode(...new Uint8Array(buf)));
const _unb64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function _syncKeyHash(phrase){const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('lifequest-sync:'+phrase));return [...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function _deriveAes(phrase,salt){const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(phrase),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
async function _encBlob(phrase,obj){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await _deriveAes(phrase,salt);const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj)));return {v:1,salt:_b64(salt),iv:_b64(iv),ct:_b64(ct)};}
async function _decBlob(phrase,p){const key=await _deriveAes(phrase,_unb64(p.salt));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:_unb64(p.iv)},key,_unb64(p.ct));return JSON.parse(new TextDecoder().decode(pt));}
function syncReady(){ return backendOn() && S.sync && S.sync.phrase; }
async function syncPush(){
  if(!backendOn()){toast('Set up the backend first (Mind → ⚙ AI settings)');return;}
  const phrase=(S.sync&&S.sync.phrase||'').trim(); if(!phrase){openSyncSettings();return;}
  toast('☁ Encrypting & pushing…');
  try{
    const obj=JSON.parse(JSON.stringify(S,(k,v)=>k==='sync'||k.charAt(0)==='_'?undefined:v));
    const payload=await _encBlob(phrase,obj);
    const key=await _syncKeyHash(phrase);
    const r=await fetch(S.backend.url.replace(/\/+$/,'')+'/sync/push',{method:'POST',headers:{'Content-Type':'application/json','X-Access-Key':S.backend.key},body:JSON.stringify({key,payload,updatedAt:Date.now()})});
    const d=await r.json(); if(!r.ok||!d.ok)throw 0;
    S.sync.last=d.updatedAt; save(); if(active==='camp')renderView();
    toast('☁ Pushed — encrypted, only your phrase can open it');
  }catch(e){ toast('Push failed — check connection and AI settings'); }
}
async function syncPull(){
  if(!backendOn()){toast('Set up the backend first');return;}
  const phrase=(S.sync&&S.sync.phrase||'').trim(); if(!phrase){openSyncSettings();return;}
  let d;
  try{
    const key=await _syncKeyHash(phrase);
    const r=await fetch(S.backend.url.replace(/\/+$/,'')+'/sync/pull?key='+key,{headers:{'X-Access-Key':S.backend.key}});
    d=await r.json();
  }catch(e){ toast('Pull failed — check your connection'); return; }
  if(!d||d.empty){ toast('Nothing in the cloud yet — push from your main device first'); return; }
  let obj;
  try{ obj=await _decBlob(phrase,d.payload); }
  catch(e){ toast('Could not decrypt — the sync phrase must match your other device exactly'); return; }
  const when=d.updatedAt?new Date(d.updatedAt).toLocaleString():'an unknown time';
  document.getElementById('modalBody').innerHTML=`<div class="grab"></div><div class="mlbl">☁ Pull from cloud</div>
    <div class="lesson" style="font-size:13px">This replaces <b>everything on this device</b> with the cloud copy from <b>${esc(when)}</b>. Anything logged here since the last push will be lost. Continue?</div>
    <div class="field" style="margin-top:12px"><button class="btn block" id="pullGo">Replace this device with cloud copy</button></div>
    <div class="field"><button class="btn ghost sm" id="qClose">Cancel</button></div>`;
  document.getElementById('modalBack').classList.add('show');
  document.getElementById('qClose').onclick=closeModal;
  document.getElementById('pullGo').onclick=()=>{
    const keepSync=S.sync;
    S=Object.assign(structuredClone(DEFAULT),obj);
    S.sync=keepSync; if(d.updatedAt)S.sync.last=d.updatedAt;
    normalizeState(); save(); closeModal(); renderAll();
    toast('☁ Pulled — this device now matches the cloud');
  };
}
function openSyncSettings(){
  const s=S.sync||{phrase:''};
  document.getElementById('modalBody').innerHTML=`<div class="grab"></div><div class="mlbl">☁ Sync settings</div>
    <div class="lesson" style="font-size:13px">Set one secret <b>sync phrase</b>, and enter the exact same phrase on your other device. Your data is encrypted with it <b>before it ever leaves the device</b> — no one, not even the server, can read it. Pick something long and unique. <b>Don't lose it:</b> without the phrase, the cloud copy can't be unlocked.</div>
    <div style="font-size:11px;color:var(--muted);margin-top:12px">Sync phrase</div>
    <input id="syncPhrase" placeholder="four random words you'll remember" value="${esc(s.phrase||'')}" style="width:100%;margin-top:4px">
    <div class="field" style="margin-top:12px"><button class="btn block" id="syncSave">Save phrase</button></div>
    <div class="field"><button class="btn ghost sm" id="qClose">Close</button></div>
    <div class="hint">Uses your existing Worker + KV. Sync is free and doesn't touch your AI daily limit.</div>`;
  document.getElementById('modalBack').classList.add('show');
  document.getElementById('qClose').onclick=closeModal;
  document.getElementById('syncSave').onclick=()=>{S.sync=S.sync||{};S.sync.phrase=val('syncPhrase').trim();save();closeModal();renderView();toast(S.sync.phrase?'Sync phrase saved':'Sync phrase cleared');};
}
